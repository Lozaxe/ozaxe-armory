name: Update Ozaxe Stats

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write   # <-- AJOUTE CES 2 LIGNES

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: python scrape_stats.py
      - run: |
          git config user.name "ozaxe-bot"
          git config user.email "bot@ozaxe.local"
          git add data.json
          if ! git diff --cached --quiet; then
            git commit -m "update stats $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
