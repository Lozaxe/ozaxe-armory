name: Update Ozaxe Stats

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install deps
        run: pip install requests beautifulsoup4
          
      - name: Run scraper
        run: python scrape_stats.py
          
      - name: Commit data
        run: |
          git config user.name "ozaxe-bot"
          git config user.email "bot@ozaxe.local"
          git add data.json
          git diff --cached --quiet || git commit -m "update stats $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
