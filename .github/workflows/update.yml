name: Update Ozaxe
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm i playwright
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Scrape
        run: node scrape.js
      - name: Commit
        run: |
          git config user.name "ozaxe-bot"
          git config user.email "bot@ozaxe.fr"
          git add data.json
          git diff --cached --quiet || git commit -m "update $(date -u +%FT%TZ)"
          git push
